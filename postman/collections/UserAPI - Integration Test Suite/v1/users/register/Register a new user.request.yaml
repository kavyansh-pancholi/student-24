$kind: http-request
url: '{{baseUrl}}/v1/users/register'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{newUsername}}",
      "password": "{{newPassword}}"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const username = pm.variables.replaceIn('{{$randomUserName}}') + '_' + Math.floor(Math.random() * 10000);
      const password = pm.variables.replaceIn('{{$randomPassword}}');
      pm.collectionVariables.set('newUsername', username);
      pm.collectionVariables.set('newPassword', password);
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', function () {
        pm.response.to.have.status(201);
      });

      pm.test('Response has JSON content-type', function () {
        pm.response.to.have.header('Content-Type');
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response body has required fields', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property('id');
        pm.expect(jsonData).to.have.property('username');
        pm.expect(jsonData).to.have.property('token');
      });

      pm.test('id is a number', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.id).to.be.a('number');
      });

      pm.test('username matches the registered username', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.username).to.eql(pm.collectionVariables.get('newUsername'));
      });

      pm.test('token is a non-empty string', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.token).to.be.a('string').and.to.have.length.above(0);
      });

      const jsonData = pm.response.json();
      pm.collectionVariables.set('userId', jsonData.id);
examples: './.resources/Register a new user.resources/examples'
order: 1000
