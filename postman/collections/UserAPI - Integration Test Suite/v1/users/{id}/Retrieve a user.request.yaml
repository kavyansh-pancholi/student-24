$kind: http-request
url: '{{baseUrl}}/v1/users/:id'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '{{userId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.response.to.have.header('Content-Type');
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response body has required fields', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property('id');
        pm.expect(jsonData).to.have.property('username');
      });

      pm.test('id is a number', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.id).to.be.a('number');
      });

      pm.test('returned id matches the requested userId', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.id).to.eql(pm.collectionVariables.get('userId'));
      });

      pm.test('username is a non-empty string', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.username).to.be.a('string').and.to.have.length.above(0);
      });

      pm.test('username matches the registered username', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.username).to.eql(pm.collectionVariables.get('newUsername'));
      });
examples: './.resources/Retrieve a user.resources/examples'
order: 1000
