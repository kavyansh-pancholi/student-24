$kind: http-request
url: '{{baseUrl}}/v1/users/:id'
method: DELETE
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '{{userId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.response.to.have.header('Content-Type');
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response body has a message field', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property('message');
      });

      pm.test('message is a non-empty string', function () {
        const jsonData = pm.response.json();
        pm.expect(jsonData.message).to.be.a('string').and.to.have.length.above(0);
      });

      pm.test('Cleanup: clear userId collection variable', function () {
        pm.collectionVariables.unset('userId');
        pm.expect(pm.collectionVariables.get('userId')).to.be.undefined;
      });
order: 2000
