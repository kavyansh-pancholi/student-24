$kind: http-request
description: |-
  Permanently deletes a user account identified by their numeric ID. This action is irreversible.

  **Path Variables**
  | Variable | Type | Required | Description |
  |----------|------|----------|-------------|
  | `id` | integer | ✅ | The unique numeric ID of the user to delete |

  **Responses**
  | Status | Description |
  |--------|-------------|
  | `200 OK` | User deleted successfully |
  | `404 Not Found` | No user found with the given ID |
  | `500 Internal Server Error` | An unexpected error occurred |
url: '{{baseUrl}}/v1/users/:id'
method: DELETE
headers:
  Accept: application/json
