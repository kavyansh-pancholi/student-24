$kind: http-request
description: |-
  Updates the username and/or password of an existing user identified by their numeric ID.

  **Path Variables**
  | Variable | Type | Required | Description |
  |----------|------|----------|-------------|
  | `id` | integer | ✅ | The unique numeric ID of the user to update |

  **Request Body**
  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `username` | string | ✅ | The new username |
  | `password` | string | ✅ | The new password |

  **Responses**
  | Status | Description |
  |--------|-------------|
  | `200 OK` | User updated successfully. Returns the updated user object |
  | `404 Not Found` | No user found with the given ID |
  | `500 Internal Server Error` | An unexpected error occurred |
url: '{{baseUrl}}/v1/users/:id'
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
